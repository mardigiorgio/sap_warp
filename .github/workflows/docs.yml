name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "README.md"
      - "TELEOP_README.md"
      - "sim/**"
      - "viewer/**"
      - "test/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "README.md"
      - "TELEOP_README.md"
      - "sim/**"
      - "viewer/**"
      - "test/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-gh-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Install project and documentation dependencies
        run: uv sync --group docs

      - name: Build documentation
        run: uv run --group docs sphinx-build -W -b html docs docs/_build/html

      - name: Upload built documentation
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/_build/html
          if-no-files-found: error

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built documentation
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -f site/index.html
          cd site
          touch .nojekyll
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy documentation from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
