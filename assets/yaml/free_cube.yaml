schema_version: 1
name: small_cube_spin_release

simulation:
  dt: 0.005
  num_worlds: 1
  max_rigid_contact: 256
  solver:
    contact_preset_variant: drake
    line_search_variant: armijo_decay

builder:
  gravity: -9.81
  rigid_gap: 0.002
  default_body_armature: 0.0
  defaults:
    joint:
      armature: 0.0
      target_ke: 0.0
      target_kd: 0.0
    shape:
      density: 1000.0
      ke: 10000.0
      tau: 0.03
      mu: 0.1

ground:
  enabled: true
  label: DEFAULT_GROUND
  cfg:
    is_visible: true
    has_shape_collision: true
    has_particle_collision: false

bodies:
  - id: cube
    label: small_cube
    transform:
      p: [0.35, 0.0, 0.12]
      q: [0.0, 0.0, 0.0, 1.0]
    shapes:
      - type: box
        hx: 0.02
        hy: 0.02
        hz: 0.02
        color: [1.0, 0.45, 0.05]
        cfg:
          density: 1500.0
          mu: 0.5

joints:
  - id: cube_free
    type: free
    parent: world
    child: cube

articulations:
  - id: cube_articulation
    joints: [cube_free]

post_build:
  - op: set_array
    array: joint_q
    range: all
    values: [0.35, 0.0, 0.12, 0.0, 0.0, 0.0, 1.0]
  - op: set_array
    array: joint_qd
    range: all
    values: [0.5, 0.2, 0.3, 2.0, 1.0, 6.0]
